<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODSEAL 3D Viewer – Algorithm: Maria</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4960a;
  --gold2: #f7c948;
  --gold3: #ffe9a0;
  --bg1: #0d0625;
  --bg2: #1a0a45;
  --violet: #7c4dff;
  --violet2: #b388ff;
  --panel: rgba(15,5,40,0.97);
  --text: #f5eeff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:radial-gradient(ellipse at 50% 30%, #1e0b55 0%, #0d0625 60%, #000 100%);
  font-family:'Cinzel',serif;
  color:var(--text);
  overflow:hidden;
  height:100vh;width:100vw;
}
canvas{display:block;}
#canvas-container{position:fixed;inset:0;cursor:grab;}
#canvas-container:active{cursor:grabbing;}

/* ── HEADER ── */
#header{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;
  background:linear-gradient(180deg,rgba(13,6,37,0.98) 0%,rgba(13,6,37,0.4) 80%,transparent 100%);
  z-index:100;pointer-events:none;
  border-bottom:1px solid rgba(212,150,10,0.12);
}
.h-left{display:flex;flex-direction:column;gap:2px;}
.h-algo{font-size:9px;letter-spacing:5px;color:var(--gold2);opacity:.9;text-transform:uppercase;}
.h-brand{
  font-size:26px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(247,201,72,0.5));
}
.h-user{
  font-family:'Noto Serif JP',serif;
  font-size:14px;color:var(--violet2);letter-spacing:3px;
  text-shadow:0 0 20px rgba(179,136,255,0.6);
}

/* ── CONTROLS ── */
#controls{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;z-index:100;
}
.ctrl-btn{
  background:rgba(124,77,255,0.18);
  border:1px solid rgba(247,201,72,0.35);
  color:var(--gold3);
  padding:10px 22px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  cursor:pointer;backdrop-filter:blur(16px);
  transition:all .25s;border-radius:3px;
  box-shadow:0 2px 20px rgba(124,77,255,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
}
.ctrl-btn:hover, .ctrl-btn.active{
  background:rgba(247,201,72,0.22);
  border-color:var(--gold2);
  color:var(--gold2);
  box-shadow:0 0 28px rgba(247,201,72,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  transform:translateY(-1px);
}

/* ── DETAIL PANEL ── */
#detail-panel{
  position:fixed;right:-400px;top:50%;transform:translateY(-50%);
  width:360px;
  background:linear-gradient(135deg,rgba(13,6,37,0.98),rgba(25,10,65,0.98));
  border:1px solid rgba(212,150,10,0.3);
  border-right:none;
  padding:32px 28px;
  z-index:200;
  transition:right .5s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(24px);
  box-shadow:-30px 0 80px rgba(0,0,0,.7), inset 1px 0 0 rgba(247,201,72,0.08);
}
#detail-panel.open{right:0;}
.panel-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;color:rgba(179,136,255,0.5);
  font-size:16px;cursor:pointer;
  transition:color .2s;
}
.panel-close:hover{color:var(--gold2);}
.p-badge{
  display:inline-block;
  font-size:8px;letter-spacing:4px;
  color:var(--gold2);
  border:1px solid rgba(212,150,10,0.4);
  padding:3px 10px;margin-bottom:14px;
  background:rgba(212,150,10,0.08);
}
.p-name{
  font-family:'Noto Serif JP',serif;
  font-size:28px;font-weight:700;
  color:#fff;margin-bottom:6px;line-height:1.25;
  text-shadow:0 0 30px rgba(247,201,72,0.3);
}
.p-number{
  font-size:56px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--gold3),var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 15px rgba(247,201,72,0.4));
  margin-bottom:20px;
}
.p-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,150,10,0.5),rgba(179,136,255,0.3),transparent);
  margin:16px 0;
}
.p-label{font-size:8px;letter-spacing:4px;color:rgba(179,136,255,0.6);margin-bottom:8px;}
.p-keywords{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.kw-tag{
  background:linear-gradient(135deg,rgba(124,77,255,0.25),rgba(124,77,255,0.1));
  border:1px solid rgba(179,136,255,0.3);
  padding:5px 12px;font-size:10px;letter-spacing:1px;
  color:var(--violet2);border-radius:2px;
  font-family:'Noto Serif JP',serif;
  transition:all .2s;
}
.kw-tag:hover{border-color:var(--gold2);color:var(--gold2);}
.p-desc{
  font-family:'Noto Serif JP',serif;
  font-size:12.5px;line-height:2;color:rgba(210,190,255,0.8);
}

/* ── TOOLTIP ── */
#tooltip{
  position:fixed;pointer-events:none;
  background:linear-gradient(135deg,rgba(13,6,37,0.97),rgba(25,10,65,0.97));
  border:1px solid rgba(212,150,10,0.5);
  padding:7px 14px;
  font-size:11px;letter-spacing:2px;
  color:var(--gold2);
  backdrop-filter:blur(12px);
  display:none;z-index:400;
  font-family:'Noto Serif JP',serif;
  white-space:nowrap;
  box-shadow:0 4px 24px rgba(0,0,0,.5), 0 0 20px rgba(212,150,10,0.15);
  border-radius:2px;
}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at center,#1a0845 0%,#050210 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s;
}
.ld-icon{
  width:80px;height:80px;border-radius:50%;
  border:2px solid rgba(212,150,10,0.4);
  position:relative;
  animation:spin 3s linear infinite;
}
.ld-icon::before{
  content:'';position:absolute;inset:8px;border-radius:50%;
  border:1px solid rgba(179,136,255,0.3);
}
.ld-icon::after{
  content:'';position:absolute;inset:50%;transform:translate(-50%,-50%);
  width:12px;height:12px;border-radius:50%;
  background:radial-gradient(circle,var(--gold2),var(--gold));
  box-shadow:0 0 20px var(--gold2),0 0 40px rgba(247,201,72,0.4);
}
@keyframes spin{to{transform:rotate(360deg);}}
.ld-title{
  font-size:36px;font-weight:900;letter-spacing:10px;
  background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(247,201,72,0.5));
}
.ld-bar-wrap{width:220px;height:1px;background:rgba(179,136,255,0.2);}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--violet),var(--gold2));transition:width .08s;}
.ld-sub{font-size:8px;letter-spacing:5px;color:var(--gold2);opacity:.6;}

/* ── HINT ── */
#hint{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:3px;color:rgba(179,136,255,0.45);
  pointer-events:none;z-index:100;text-align:center;white-space:nowrap;
  animation:hintFade 5s forwards 1.5s;opacity:0;
}
@keyframes hintFade{0%{opacity:0}15%{opacity:1}70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-icon"></div>
  <div class="ld-title">GODSEAL</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
  <div class="ld-sub">INITIALIZING 3D UNIVERSE...</div>
</div>

<div id="header">
  <div class="h-left">
    <div class="h-algo">Algorithm : Maria</div>
    <div class="h-brand">GOD SEAL</div>
  </div>
  <div class="h-user">やまちゃん</div>
</div>

<div id="hint">ドラッグで回転　/　スクロールでズーム　/　カードをクリックで詳細表示</div>

<div id="canvas-container"></div>

<div id="detail-panel" id="detail-panel">
  <button class="panel-close" id="panel-close">✕</button>
  <div class="p-badge" id="p-sephira">ケテル</div>
  <div class="p-name" id="p-name">命の泉</div>
  <div class="p-number" id="p-number">01</div>
  <div class="p-divider"></div>
  <div class="p-label">KEYWORDS</div>
  <div class="p-keywords" id="p-keywords"></div>
  <div class="p-divider"></div>
  <div class="p-label">DESCRIPTION</div>
  <div class="p-desc" id="p-desc"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-auto">⟳ 自動回転</button>
  <button class="ctrl-btn" id="btn-reset">◎ リセット</button>
  <button class="ctrl-btn" id="btn-flat">⬡ 2D 表示</button>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const NODES = [
  { id:0,  name:"命の泉",         num:"01", sephira:"ケテル（王冠）",     pos:[0,4.4,0],       col:0xffe082, accent:"#ffe082", keywords:["命の泉","生きるプロ","未来予知"],             desc:"生命の頂点に位置する王冠のセフィラ。純粋な存在の本質と始まりを象徴する。すべての創造の源泉。"},
  { id:1,  name:"カリスマ性",     num:"20", sephira:"ダアト（知識）",     pos:[0,2.5,0.4],     col:0xce93d8, accent:"#ce93d8", keywords:["カリスマ性","人気","魂のうた","翼のうた"],       desc:"隠されたセフィラ。知識と神秘の交差点。他者を惹きつけるカリスマと深い洞察力を持つ。"},
  { id:2,  name:"初の試み",       num:"27", sephira:"ホクマー（知恵）",   pos:[-3.3,1.5,0],    col:0xff8a65, accent:"#ff8a65", keywords:["愛想り","初回13倍","飛行機","スキー"],            desc:"右柱の最上位。純粋な知恵と直感の力。新しい挑戦への勇気と開拓精神が宿る。"},
  { id:3,  name:"顕微鏡手術",     num:"51", sephira:"ビナー（理解）",    pos:[3.3,1.5,0],     col:0x80deea, accent:"#80deea", keywords:["術後ケア","修行","コツ","チーム"],                 desc:"左柱の上位。深い理解と分析の力。細部への洞察と精密さで真実を見極める能力。"},
  { id:4,  name:"生きるプロ",     num:"02", sephira:"ティファレト（美）", pos:[0,0,0],         col:0xffd54f, accent:"#ffd54f", keywords:["ランクUP","命の泉","生きるプロ"],                  desc:"生命の樹の中心。美と調和の象徴。すべてのエネルギーが集まる黄金の中心点。"},
  { id:5,  name:"女王蜂",         num:"59", sephira:"ヘセド（慈悲）",    pos:[-2.3,-0.9,0.3], col:0xa5d6a7, accent:"#a5d6a7", keywords:["バイタリティ","資産家","節約","マネタイズ"],      desc:"慈悲と拡張の力。女王のごとく周囲を包み込む愛と豊かさ。財の流れを司る。"},
  { id:6,  name:"えんま大王",     num:"25", sephira:"ゲブラー（峻厳）",  pos:[2.3,-0.9,0.3],  col:0xef9a9a, accent:"#ef9a9a", keywords:["プレミアム","真心","切断","キリスト","地"],        desc:"厳格な審判と浄化の力。不要なものを断ち切り、本質のみを残す峻厳なる意志。"},
  { id:7,  name:"着板女優",       num:"54", sephira:"ネツァク（勝利）",  pos:[-3.3,-2.5,0],   col:0xf48fb1, accent:"#f48fb1", keywords:["チャンス","大空","フランス"],                      desc:"勝利と永続の力。芸術と美の女神。舞台の上で輝き続ける不滅の生命力。"},
  { id:8,  name:"私のことば",     num:"43", sephira:"ホド（栄光）",      pos:[0,-2.5,0],      col:0x90caf9, accent:"#90caf9", keywords:["わたし","言霊","アイデア"],                        desc:"コミュニケーションと栄光の領域。言葉の力、思考の精確さ、情報の流れを司る。"},
  { id:9,  name:"人事異動",       num:"13", sephira:"イェソド（基礎）",  pos:[3.3,-2.5,0],    col:0xb0bec5, accent:"#b0bec5", keywords:["大成功","十風","フランス革命"],                    desc:"基礎と無意識の月。変化と移動の中に潜む深いパターン。潜在意識の扉。"},
  { id:10, name:"紀伊国屋文左衛門",num:"54",sephira:"マルクト（王国）",  pos:[0,-4.4,0],      col:0xc5e1a5, accent:"#c5e1a5", keywords:["商人","プリティーウーマン","潮目"],                desc:"物質世界と王国の領域。地に足のついた実践力と、商人としての知恵と行動力。"}
];

const PATHS=[
  [0,1],[0,2],[0,3],
  [1,2],[1,3],[1,4],
  [2,4],[2,5],[3,4],[3,6],
  [4,5],[4,6],[4,7],[4,8],[4,9],
  [5,6],[5,7],[5,8],[6,8],[6,9],
  [7,8],[7,10],[8,9],[8,10],[9,10]
];

// ══════════════════════════════════════════
// RENDERER
// ══════════════════════════════════════════
const container=document.getElementById('canvas-container');
const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(52,W/H,0.1,200);
camera.position.set(0,0,14);

// ── Lights ──
scene.add(new THREE.AmbientLight(0xffeedd,1.2));

const cLight=new THREE.PointLight(0xffd700,6,25);
cLight.position.set(0,0,5);
scene.add(cLight);

const tLight=new THREE.PointLight(0xaa88ff,3,20);
tLight.position.set(-2,6,3);
scene.add(tLight);

const bLight=new THREE.PointLight(0x88aaff,2,18);
bLight.position.set(2,-6,3);
scene.add(bLight);

const rimLight=new THREE.DirectionalLight(0xffeedd,0.8);
rimLight.position.set(0,0,10);
scene.add(rimLight);

// ── Stars ──
(()=>{
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(2500*3);
  const cols=new Float32Array(2500*3);
  const starColors=[[1,.95,.8],[.8,.8,1],[1,.8,.9],[.8,1,1]];
  for(let i=0;i<2500;i++){
    pos[i*3]=(Math.random()-.5)*130;
    pos[i*3+1]=(Math.random()-.5)*130;
    pos[i*3+2]=(Math.random()-.5)*130;
    const c=starColors[Math.floor(Math.random()*starColors.length)];
    cols[i*3]=c[0]; cols[i*3+1]=c[1]; cols[i*3+2]=c[2];
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  scene.add(new THREE.Points(geo,new THREE.PointsMaterial({size:.09,vertexColors:true,transparent:true,opacity:.85})));
})();

// ── Background nebula spheres ──
[
  {col:0x3311aa,x:-8,y:4,r:6,op:.12},
  {col:0x8811aa,x:8,y:-3,r:7,op:.1},
  {col:0x1144aa,x:0,y:0,r:9,op:.08},
].forEach(({col,x,y,r,op})=>{
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(r,16,16),
    new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:op,side:THREE.BackSide})
  );
  m.position.set(x,y,-5);
  scene.add(m);
});

// ══════════════════════════════════════════
// PATHS
// ══════════════════════════════════════════
PATHS.forEach(([a,b])=>{
  const pA=new THREE.Vector3(...NODES[a].pos);
  const pB=new THREE.Vector3(...NODES[b].pos);
  const pts=[];
  for(let i=0;i<=20;i++){
    const t=i/20;
    const p=new THREE.Vector3().lerpVectors(pA,pB,t);
    p.z+=Math.sin(t*Math.PI)*0.18;
    pts.push(p);
  }
  // Bright path line
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  scene.add(new THREE.Line(geo,new THREE.LineBasicMaterial({
    color:0xc8a0ff, transparent:true, opacity:.5
  })));
  // Gold glow line
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([pA,pB]),
    new THREE.LineBasicMaterial({color:0xffd700,transparent:true,opacity:.12})
  ));
});

// ══════════════════════════════════════════
// NODE TEXTURES
// ══════════════════════════════════════════
function makeNodeTexture(node){
  const S=512;
  const c=document.createElement('canvas');
  c.width=c.height=S;
  const ctx=c.getContext('2d');

  const hex=node.accent;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const rgba=(a)=>`rgba(${r},${g},${b},${a})`;

  // ── Base: rich dark with color tint ──
  const bg=ctx.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
  bg.addColorStop(0,  rgba(.18));
  bg.addColorStop(.45,`rgba(18,8,45,0.97)`);
  bg.addColorStop(1,  `rgba(8,3,22,1)`);
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.arc(S/2,S/2,S/2-2,0,Math.PI*2);ctx.fill();

  // ── Outer glow ring ──
  const ringGrad=ctx.createRadialGradient(S/2,S/2,S/2-24,S/2,S/2,S/2-2);
  ringGrad.addColorStop(0,rgba(.9));
  ringGrad.addColorStop(.5,rgba(.4));
  ringGrad.addColorStop(1,rgba(.0));
  ctx.beginPath();ctx.arc(S/2,S/2,S/2-6,0,Math.PI*2);
  ctx.strokeStyle=hex; ctx.lineWidth=5;
  ctx.shadowColor=hex; ctx.shadowBlur=30;
  ctx.stroke(); ctx.shadowBlur=0;

  // ── Inner decorative ring ──
  ctx.beginPath();ctx.arc(S/2,S/2,S/2-28,0,Math.PI*2);
  ctx.strokeStyle=`rgba(255,220,100,0.35)`;ctx.lineWidth=1.5;ctx.stroke();

  // ── Dot markers on outer ring ──
  for(let i=0;i<24;i++){
    const angle=(i/24)*Math.PI*2;
    const rr=S/2-14;
    const px=S/2+Math.cos(angle)*rr, py=S/2+Math.sin(angle)*rr;
    ctx.beginPath();ctx.arc(px,py,i%6===0?4.5:2,0,Math.PI*2);
    ctx.fillStyle=i%6===0?'#ffd700':rgba(.8);
    ctx.shadowColor=i%6===0?'#ffd700':hex;
    ctx.shadowBlur=i%6===0?10:5;
    ctx.fill();ctx.shadowBlur=0;
  }

  // ── Center glow ──
  const cg=ctx.createRadialGradient(S/2,S/2,0,S/2,S/2,80);
  cg.addColorStop(0,rgba(.5)); cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.arc(S/2,S/2,80,0,Math.PI*2);ctx.fill();

  // ── Cross lines ──
  ctx.strokeStyle=rgba(.15); ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(S/2-S*.35,S/2);ctx.lineTo(S/2+S*.35,S/2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(S/2,S/2-S*.35);ctx.lineTo(S/2,S/2+S*.35);ctx.stroke();

  // ── Number ──
  ctx.font=`bold 130px 'Cinzel',serif`;
  ctx.fillStyle='#ffffff';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=hex; ctx.shadowBlur=35;
  ctx.fillText(node.num,S/2,S/2-16);
  // number outline for contrast
  ctx.strokeStyle=rgba(.6); ctx.lineWidth=1.5;
  ctx.strokeText(node.num,S/2,S/2-16);
  ctx.shadowBlur=0;

  // ── Name ──
  const nm=node.name.replace('\n',' ');
  const fs=nm.length>8?'19px':nm.length>6?'21px':'24px';
  ctx.font=`${fs} 'Noto Serif JP',serif`;
  ctx.fillStyle='rgba(240,225,255,0.95)';
  ctx.shadowColor='rgba(0,0,0,.8)'; ctx.shadowBlur=8;
  ctx.fillText(nm,S/2,S/2+80);
  ctx.shadowBlur=0;

  return new THREE.CanvasTexture(c);
}

// ══════════════════════════════════════════
// NODE MESHES
// ══════════════════════════════════════════
const nodeMeshes=[];
const glowMeshes=[];
const nodeGroup=new THREE.Group();
scene.add(nodeGroup);

NODES.forEach((node,i)=>{
  // Card
  const mat=new THREE.MeshStandardMaterial({
    map:makeNodeTexture(node),
    transparent:true,opacity:0,
    roughness:.15,metalness:.85,
    emissive:new THREE.Color(node.col),
    emissiveIntensity:.15,
    side:THREE.DoubleSide
  });
  const mesh=new THREE.Mesh(new THREE.CircleGeometry(.8,64),mat);
  mesh.position.set(node.pos[0],node.pos[1]-9,node.pos[2]);
  mesh.userData={ni:i,orig:new THREE.Vector3(...node.pos),delay:i*.08};
  nodeMeshes.push(mesh);
  nodeGroup.add(mesh);

  // Glow halo
  const gc=document.createElement('canvas');
  gc.width=gc.height=256;
  const gx=gc.getContext('2d');
  const gg=gx.createRadialGradient(128,128,0,128,128,128);
  const ha=node.accent;
  gg.addColorStop(0,ha+'bb'); gg.addColorStop(.35,ha+'44'); gg.addColorStop(1,'transparent');
  gx.fillStyle=gg; gx.fillRect(0,0,256,256);
  const glowMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(2.2,2.2),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(gc),transparent:true,opacity:.75,depthWrite:false})
  );
  glowMesh.position.set(...node.pos);
  glowMesh.position.z-=.06;
  glowMesh.userData={ni:i};
  glowMeshes.push(glowMesh);
  nodeGroup.add(glowMesh);
});

// ══════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════
const rc=new THREE.Raycaster();
const mp=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
const panel=document.getElementById('detail-panel');
let hovered=null;

window.addEventListener('mousemove',e=>{
  mp.x=(e.clientX/window.innerWidth)*2-1;
  mp.y=-(e.clientY/window.innerHeight)*2+1;
  rc.setFromCamera(mp,camera);
  const hits=rc.intersectObjects(nodeMeshes);
  if(hits.length){
    const m=hits[0].object, n=NODES[m.userData.ni];
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+16)+'px';
    tooltip.style.top=(e.clientY-12)+'px';
    tooltip.textContent=n.name+' — '+n.num;
    document.body.style.cursor='pointer';
    hovered=m;
  }else{
    tooltip.style.display='none';
    document.body.style.cursor=isDrag?'grabbing':'grab';
    hovered=null;
  }
});

container.addEventListener('click',e=>{
  mp.x=(e.clientX/window.innerWidth)*2-1;
  mp.y=-(e.clientY/window.innerHeight)*2+1;
  rc.setFromCamera(mp,camera);
  const hits=rc.intersectObjects(nodeMeshes);
  if(hits.length) openPanel(hits[0].object.userData.ni);
});

function openPanel(i){
  const n=NODES[i];
  document.getElementById('p-sephira').textContent=n.sephira;
  document.getElementById('p-name').textContent=n.name.replace('\n',' ');
  document.getElementById('p-number').textContent=n.num;
  document.getElementById('p-desc').textContent=n.desc;
  const kw=document.getElementById('p-keywords');
  kw.innerHTML='';
  n.keywords.forEach(k=>{const s=document.createElement('span');s.className='kw-tag';s.textContent=k;kw.appendChild(s);});
  panel.classList.add('open');
}
document.getElementById('panel-close').addEventListener('click',()=>panel.classList.remove('open'));

// ══════════════════════════════════════════
// ORBIT
// ══════════════════════════════════════════
let isDrag=false,pm={x:0,y:0};
let rX=0,rY=0,tRX=0,tRY=0,zoom=14,tZoom=14;
let autoRot=false,flat=false;

container.addEventListener('mousedown',e=>{isDrag=true;pm={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  tRY+=(e.clientX-pm.x)*.0045;
  tRX+=(e.clientY-pm.y)*.0045;
  tRX=Math.max(-1.25,Math.min(1.25,tRX));
  pm={x:e.clientX,y:e.clientY};
});
container.addEventListener('wheel',e=>{tZoom+=e.deltaY*.016;tZoom=Math.max(5,Math.min(24,tZoom));},{passive:true});

// Touch
let ltd=0;
container.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDrag=true;pm={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  else if(e.touches.length===2) ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
container.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&isDrag){
    tRY+=(e.touches[0].clientX-pm.x)*.0045;
    tRX+=(e.touches[0].clientY-pm.y)*.0045;
    tRX=Math.max(-1.25,Math.min(1.25,tRX));
    pm={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    tZoom-=(d-ltd)*.04;tZoom=Math.max(5,Math.min(24,tZoom));ltd=d;
  }
},{passive:true});
container.addEventListener('touchend',()=>isDrag=false);

// Buttons
const aBtn=document.getElementById('btn-auto');
aBtn.addEventListener('click',()=>{autoRot=!autoRot;aBtn.classList.toggle('active',autoRot);aBtn.textContent=autoRot?'⏸ 停止':'⟳ 自動回転';});
document.getElementById('btn-reset').addEventListener('click',()=>{tRX=0;tRY=0;tZoom=14;});
const fBtn=document.getElementById('btn-flat');
fBtn.addEventListener('click',()=>{flat=!flat;fBtn.classList.toggle('active',flat);fBtn.textContent=flat?'🌐 3D表示':'⬡ 2D表示';if(flat){tRX=0;tRY=0;}});

// ══════════════════════════════════════════
// ANIMATE
// ══════════════════════════════════════════
const clock=new THREE.Clock();
let intro=true,introT=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  const t=clock.getElapsedTime();

  // ── Intro ──
  if(intro){
    introT+=dt*.38;
    let done=true;
    nodeMeshes.forEach((m,i)=>{
      const d=m.userData.delay;
      const p=Math.max(0,Math.min(1,(introT-d)*1.6));
      const e=1-Math.pow(1-p,4);
      const o=m.userData.orig;
      m.position.y=o.y-9*(1-e);
      m.material.opacity=e*.98;
      glowMeshes[i].position.y=m.position.y;
      glowMeshes[i].material.opacity=e*.75;
      if(p<1)done=false;
    });
    if(done)intro=false;
  }

  // ── Pulse & hover ──
  nodeMeshes.forEach((m,i)=>{
    const pulse=.12+.08*Math.sin(t*.9+i*.7);
    const isHov=(m===hovered);
    m.material.emissiveIntensity=isHov?.45:pulse;
    const sc=isHov?1+.05*Math.sin(t*5):1;
    m.scale.setScalar(sc);
    glowMeshes[i].material.opacity=(.6+.2*Math.sin(t*.7+i*.5))*(isHov?1.4:1);
  });

  // ── Light animation ──
  cLight.intensity=5+2*Math.sin(t*.6);
  tLight.intensity=2.5+1*Math.sin(t*.45+1);

  if(autoRot) tRY+=dt*.2;

  // ── Smooth camera ──
  const k=.07;
  rX+=(tRX-rX)*k; rY+=(tRY-rY)*k; zoom+=(tZoom-zoom)*k;

  if(!flat){
    camera.position.set(
      Math.sin(rY)*zoom,
      Math.sin(rX)*zoom,
      Math.cos(rY)*Math.cos(rX)*zoom
    );
  } else {
    camera.position.set(rX*zoom*.3,rX*zoom*.1,zoom);
  }
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}

// ── Resize ──
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ══════════════════════════════════════════
// LOADING
// ══════════════════════════════════════════
const bar=document.getElementById('ld-bar');
const ldEl=document.getElementById('loading');
let prog=0;
const iv=setInterval(()=>{
  prog+=Math.random()*16;
  bar.style.width=Math.min(prog,92)+'%';
  if(prog>=92)clearInterval(iv);
},65);
setTimeout(()=>{
  bar.style.width='100%';
  setTimeout(()=>{
    ldEl.style.opacity='0';
    setTimeout(()=>ldEl.remove(),1000);
    animate();
  },400);
},1300);
</script>
</body>
</html>
